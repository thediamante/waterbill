<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bill History</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0d1b2a;
    --navy-mid: #152334;
    --navy-card: #1a2d40;
    --navy-border: #243d54;
    --teal: #2ec4b6;
    --teal-glow: rgba(46,196,182,0.12);
    --amber: #ffbf69;
    --red: #e05a5a;
    --red-bg: rgba(224,90,90,0.12);
    --text-primary: #e8f0f7;
    --text-secondary: #7da0bb;
    --text-muted: #4a6b82;
    --white: #ffffff;
    --waldy: #f97316;
    --pauline: #c084fc;
    --nicka: #6ee7b7;
    --main: #fb7185;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--navy);
    color: var(--text-primary);
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
  }

  body::before {
    content: '';
    position: fixed;
    top: -200px; right: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(46,196,182,0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  .app { max-width: 780px; margin: 0 auto; }

  /* Header */
  .page-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 2rem;
    animation: fadeUp 0.4s ease both;
    flex-wrap: wrap; gap: 1rem;
  }
  .page-header-left { display: flex; flex-direction: column; gap: 4px; }
  .back-link {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 0.78rem; color: var(--text-muted);
    text-decoration: none; margin-bottom: 0.5rem;
    transition: color 0.2s;
  }
  .back-link:hover { color: var(--teal); }
  .page-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.8rem; color: var(--white);
  }
  .page-subtitle { font-size: 0.82rem; color: var(--text-secondary); }

  .record-count {
    font-size: 0.78rem; color: var(--text-muted);
    background: var(--navy-card);
    border: 1px solid var(--navy-border);
    border-radius: 20px;
    padding: 5px 14px;
    font-family: 'JetBrains Mono', monospace;
  }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 4rem 2rem;
    animation: fadeUp 0.4s ease both;
  }
  .empty-icon {
    width: 56px; height: 56px;
    margin: 0 auto 1rem;
    background: var(--teal-glow);
    border: 1px solid rgba(46,196,182,0.2);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .empty h3 { font-size: 1.1rem; color: var(--white); margin-bottom: 0.5rem; }
  .empty p { font-size: 0.85rem; color: var(--text-muted); }

  /* Record card */
  .record {
    background: var(--navy-card);
    border: 1px solid var(--navy-border);
    border-radius: 16px;
    margin-bottom: 1rem;
    overflow: hidden;
    animation: fadeUp 0.4s ease both;
    transition: border-color 0.2s;
  }
  .record:hover { border-color: rgba(46,196,182,0.2); }

  .record-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 1rem 1.25rem;
    cursor: pointer;
    user-select: none;
    gap: 1rem;
  }
  .record-header-left { display: flex; flex-direction: column; gap: 3px; }
  .record-date {
    font-size: 0.95rem; font-weight: 500; color: var(--white);
  }
  .record-meta {
    font-size: 0.78rem; color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
  }
  .record-header-right {
    display: flex; align-items: center; gap: 10px; flex-shrink: 0;
  }
  .record-total {
    font-size: 1.1rem; font-weight: 600;
    color: var(--teal);
    font-family: 'JetBrains Mono', monospace;
  }
  .chevron {
    width: 20px; height: 20px;
    color: var(--text-muted);
    transition: transform 0.25s;
    flex-shrink: 0;
  }
  .record.open .chevron { transform: rotate(180deg); }

  /* Household pills row */
  .household-pills {
    display: flex; gap: 6px; flex-wrap: wrap;
    padding: 0 1.25rem 1rem;
  }
  .hpill {
    display: flex; flex-direction: column;
    border-radius: 10px;
    padding: 8px 12px;
    flex: 1; min-width: 80px;
    border: 1px solid transparent;
  }
  .hpill-name { font-size: 0.7rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; opacity: 0.7; margin-bottom: 2px; }
  .hpill-amt { font-size: 1rem; font-weight: 600; font-family: 'JetBrains Mono', monospace; }
  .hpill-pct { font-size: 0.72rem; opacity: 0.65; font-family: 'JetBrains Mono', monospace; }
  .hpill.waldy  { background: rgba(249,115,22,0.1);  border-color: rgba(249,115,22,0.2);  color: #f97316; }
  .hpill.pauline{ background: rgba(192,132,252,0.1); border-color: rgba(192,132,252,0.2); color: #c084fc; }
  .hpill.nicka  { background: rgba(110,231,183,0.1); border-color: rgba(110,231,183,0.2); color: #6ee7b7; }
  .hpill.main   { background: rgba(251,113,133,0.08);border-color: rgba(251,113,133,0.2); color: #fb7185; }
  .hpill.main.zero { opacity: 0.35; }

  /* Expanded detail */
  .record-detail {
    display: none;
    border-top: 1px solid var(--navy-border);
  }
  .record.open .record-detail { display: block; }

  .detail-section { padding: 1rem 1.25rem; border-bottom: 1px solid var(--navy-border); }
  .detail-section:last-child { border-bottom: none; }
  .detail-label {
    font-size: 0.68rem; font-weight: 600; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--teal);
    margin-bottom: 0.75rem;
  }

  table { width: 100%; border-collapse: collapse; }
  th {
    font-size: 0.7rem; font-weight: 500; letter-spacing: 0.05em;
    text-transform: uppercase; color: var(--text-muted);
    padding: 0 0.75rem 0.5rem; text-align: left;
  }
  th:first-child { padding-left: 0; }
  td {
    padding: 0.6rem 0.75rem;
    font-size: 0.85rem; color: var(--text-primary);
    border-top: 1px solid rgba(36,61,84,0.6);
  }
  td:first-child { padding-left: 0; }
  tr.total-row td {
    border-top: 1px solid rgba(46,196,182,0.2);
    font-weight: 600; color: var(--white);
    background: rgba(46,196,182,0.04);
  }
  tr.main-row td { color: var(--text-secondary); font-style: italic; }
  tr.main-row.zero td { opacity: 0.4; }

  .pct-badge {
    display: inline-block;
    background: rgba(46,196,182,0.1); color: var(--teal);
    border-radius: 5px; padding: 1px 7px;
    font-size: 0.78rem; font-weight: 500;
    font-family: 'JetBrains Mono', monospace;
  }
  .amt-strong { font-family: 'JetBrains Mono', monospace; font-weight: 600; color: var(--amber); }
  tr.main-row .amt-strong { color: var(--text-secondary); font-weight: 400; }

  .summary-row {
    display: flex; gap: 1rem; flex-wrap: wrap;
  }
  .sitem { flex: 1; min-width: 100px; }
  .sitem-label { font-size: 0.72rem; color: var(--text-muted); margin-bottom: 2px; }
  .sitem-val { font-size: 1rem; font-weight: 600; font-family: 'JetBrains Mono', monospace; color: var(--text-primary); }

  /* Delete button */
  .delete-btn {
    margin: 0.75rem 1.25rem 1rem;
    display: flex; align-items: center; gap: 6px;
    background: transparent;
    border: 1px solid rgba(224,90,90,0.25);
    border-radius: 8px;
    color: var(--red);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    padding: 6px 12px;
    cursor: pointer;
    transition: all 0.2s;
    width: fit-content;
  }
  .delete-btn:hover { background: var(--red-bg); border-color: rgba(224,90,90,0.5); }

  /* Animations */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 480px) {
    .page-title { font-size: 1.4rem; }
    td, th { padding: 0.5rem 0.5rem; }
    td:first-child, th:first-child { padding-left: 0; }
  }
</style>
</head>
<body>
<div class="app">

  <div class="page-header">
    <div class="page-header-left">
      <a href="index.html" class="back-link">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15,18 9,12 15,6"/></svg>
        Back to calculator
      </a>
      <div class="page-title">Bill History</div>
      <div class="page-subtitle">All calculations recorded on this device</div>
    </div>
    <div class="record-count" id="record-count">0 records</div>
  </div>

  <div id="history-list"></div>

</div>

<script>
const LABELS = {waldy:'Waldy', pauline:'Pauline', nicka:'Nicka', main:'Main'};
const ALL_HH = ['waldy','pauline','nicka','main'];

function fmtPhp(n) {
  return '₱' + n.toLocaleString('en-PH',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function fmtDate(iso) {
  return new Date(iso).toLocaleDateString('en-PH',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
}
function fmtDateShort(iso) {
  return new Date(iso).toLocaleDateString('en-PH',{year:'numeric',month:'short',day:'numeric', hour:'2-digit', minute:'2-digit'});
}
function pad4(n) { return String(n).padStart(4,'0'); }

function loadHistory() {
  try { return JSON.parse(localStorage.getItem('wbc_history') || '[]'); } catch(e) { return []; }
}
function saveHistory(data) {
  localStorage.setItem('wbc_history', JSON.stringify(data));
}

function deleteRecord(id) {
  let h = loadHistory().filter(r => r.id !== id);
  saveHistory(h);
  render();
}

function toggleRecord(id) {
  const el = document.getElementById(`rec-${id}`);
  if (el) el.classList.toggle('open');
}

function render() {
  const history = loadHistory();
  const list = document.getElementById('history-list');
  const countEl = document.getElementById('record-count');
  countEl.textContent = `${history.length} record${history.length !== 1 ? 's' : ''}`;

  if (history.length === 0) {
    list.innerHTML = `
      <div class="empty">
        <div class="empty-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#2ec4b6" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>
        </div>
        <h3>No records yet</h3>
        <p>Every calculation you run will be saved here automatically.</p>
      </div>`;
    return;
  }

  list.innerHTML = '';
  history.forEach((r, idx) => {
    const card = document.createElement('div');
    card.className = 'record';
    card.id = `rec-${r.id}`;
    card.style.animationDelay = `${idx * 0.04}s`;

    // Household pills
    const pillsHtml = ALL_HH.map(h => {
      const isZero = h === 'main' && r.cons[h] === 0;
      return `<div class="hpill ${h}${isZero?' zero':''}">
        <div class="hpill-name">${LABELS[h]}</div>
        <div class="hpill-amt">${fmtPhp(r.amts[h])}</div>
        <div class="hpill-pct">${r.pct[h].toFixed(2)}%</div>
      </div>`;
    }).join('');

    // Meter readings table
    const meterRowsHtml = ['waldy','pauline','nicka'].map(h => {
      const rd = r.readings[h];
      return `<tr>
        <td style="font-weight:500">${LABELS[h]}</td>
        <td><span style="font-family:'JetBrains Mono',monospace">${pad4(rd.prev)}<span style="color:#e05a5a">${rd.prevLast}</span></span></td>
        <td><span style="font-family:'JetBrains Mono',monospace">${pad4(rd.curr)}<span style="color:#e05a5a">${rd.currLast}</span></span></td>
        <td style="font-family:'JetBrains Mono',monospace;font-weight:600;color:#2ec4b6">${r.cons[h]} m³</td>
      </tr>`;
    }).join('');

    // Cost breakdown table
    const costRowsHtml = ALL_HH.map(h => {
      const isMain = h === 'main';
      const isZero = isMain && r.cons[h] === 0;
      const nameCell = isMain ? `${LABELS[h]} <span style="font-size:0.73rem;opacity:0.6">(shared excess)</span>` : LABELS[h];
      return `<tr class="${isMain?'main-row':''}${isZero?' zero':''}">
        <td style="${!isMain?'font-weight:500':''}">${nameCell}</td>
        <td style="font-family:'JetBrains Mono',monospace">${r.cons[h]} m³</td>
        <td><span class="pct-badge">${r.pct[h].toFixed(2)}%</span></td>
        <td class="amt-strong">${fmtPhp(r.amts[h])}</td>
      </tr>`;
    }).join('');

    const disparity = r.billCbm - r.meterTotal;

    card.innerHTML = `
      <div class="record-header" onclick="toggleRecord(${r.id})">
        <div class="record-header-left">
          <div class="record-date">${fmtDate(r.date)}</div>
          <div class="record-meta">${r.billCbm} m³ bill &nbsp;·&nbsp; ${r.grandTotal} m³ total &nbsp;·&nbsp; ${fmtDateShort(r.date)}</div>
        </div>
        <div class="record-header-right">
          <div class="record-total">${fmtPhp(r.billPhp)}</div>
          <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6,9 12,15 18,9"/></svg>
        </div>
      </div>

      <div class="household-pills">${pillsHtml}</div>

      <div class="record-detail">
        <div class="detail-section">
          <div class="detail-label">Bill summary</div>
          <div class="summary-row">
            <div class="sitem"><div class="sitem-label">Meter total</div><div class="sitem-val">${r.meterTotal} m³</div></div>
            <div class="sitem"><div class="sitem-label">Bill total</div><div class="sitem-val">${r.billCbm} m³</div></div>
            <div class="sitem"><div class="sitem-label">Disparity (Main)</div><div class="sitem-val" style="color:${r.mainCons>0?'#fb7185':'var(--text-muted)'}">${r.mainCons} m³</div></div>
            <div class="sitem"><div class="sitem-label">Bill amount</div><div class="sitem-val" style="color:var(--teal)">${fmtPhp(r.billPhp)}</div></div>
          </div>
        </div>

        <div class="detail-section">
          <div class="detail-label">Meter readings</div>
          <table>
            <thead><tr><th>Household</th><th>Last month</th><th>This month</th><th>Usage</th></tr></thead>
            <tbody>${meterRowsHtml}</tbody>
          </table>
        </div>

        <div class="detail-section">
          <div class="detail-label">Cost breakdown</div>
          <table>
            <thead><tr><th>Household</th><th>m³</th><th>Share</th><th>Amount due</th></tr></thead>
            <tbody>
              ${costRowsHtml}
              <tr class="total-row">
                <td>Total</td>
                <td style="font-family:'JetBrains Mono',monospace">${r.grandTotal} m³</td>
                <td><span class="pct-badge">100.00%</span></td>
                <td class="amt-strong">${fmtPhp(r.billPhp)}</td>
              </tr>
            </tbody>
          </table>
        </div>

        <button class="delete-btn" onclick="deleteRecord(${r.id})">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3,6 5,6 21,6"/><path d="M19,6l-1,14a2,2,0,0,1-2,2H8a2,2,0,0,1-2-2L5,6"/><path d="M10,11v6"/><path d="M14,11v6"/><path d="M9,6V4a1,1,0,0,1,1-1h4a1,1,0,0,1,1,1V6"/></svg>
          Delete this record
        </button>
      </div>
    `;

    list.appendChild(card);
  });
}

render();
</script>
</body>
</html>
